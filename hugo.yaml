baseURL: 'https://summerfall1819.github.io/'
title: "SummerFall's Blogs"
copyright: 'Copyright &copy; 2025 SummerFall'
theme: PaperMod
languageCode: zh-cn

hasCJKLanguage: true
enableRobotstxt: true
enableEmoji: true
pygmentsUseClasses: true
defaultContentLanguage: zh
defaultContentLanguageInSubdir: false

languages:
  zh:
    languageName: '简体中文'
    weight: 1
    taxonomies:
      tag: 'tags'
      category: 'categories'
      series: 'series'

    # This place is set as as the navigation page.
    menu:
      main:
        - name: 博客
          pageRef: /
          weight: 4
        - name: 关于
          url: about/
          weight: 5
        - name: 系列文章
          pageRef: series/
          weight: 10
        - name: 搜索
          pageRef: search/
          weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  # profileMode:
  #   enabled: true
  #   title: "主页" # optional default will be site title
  #   subtitle: "This is subtitle"
  #   buttons:
  #     - name: Archive
  #       url: "/content"
  #     - name: Github
  #       url: "https://github.com/"
  fuseOpts:
      isCaseSensitive: false # 是否大小写敏感
      shouldSort: true # 是否排序
      location: 0
      distance: 1000
      threshold: 0.4
      minMatchCharLength: 0
      # limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
      keys: ["title", "permalink", "summary", "content"]
      includeMatches: true